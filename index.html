<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phawa Ialih Family Tree</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent-gold: #d4a574;
            --female-border: #e8a4c9;
            --male-border: #6bb3d9;
            --line-color: #a08060;
            --bg-cream: #faf8f5;
            --bg-warm: #f5f0e8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-cream);
            color: var(--primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        header {
            text-align: center;
            padding: 15px 20px;
            background: linear-gradient(180deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            position: relative;
            z-index: 10;
            flex-shrink: 0;
        }
        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.4rem, 3vw, 2.2rem);
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .tagline {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.95rem;
            color: var(--accent-gold);
            margin-top: 4px;
        }
        .matrilineal-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(212, 165, 116, 0.15);
            border: 1px solid rgba(212, 165, 116, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
            color: var(--accent-gold);
        }

        .main-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px 20px;
            background: white;
            border-bottom: 1px solid #e8e0d4;
            flex-wrap: wrap;
            z-index: 10;
            flex-shrink: 0;
        }
        .control-btn {
            padding: 6px 14px;
            border: 1px solid #d4c4b0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--primary);
            transition: all 0.3s ease;
        }
        .control-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .legend {
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 0.75rem;
        }
        .legend-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; margin-right: 4px; }
        .legend-dot.female { background: var(--female-border); }
        .legend-dot.male { background: var(--male-border); }

        #chart-wrapper {
            flex: 1;
            overflow: auto;
            background: linear-gradient(180deg, var(--bg-cream) 0%, var(--bg-warm) 50%, var(--bg-cream) 100%);
            position: relative;
        }
        #chart-wrapper svg { display: block; margin: 0 auto; }

        .node-group { cursor: pointer; }
        .node-rect {
            fill: white;
            stroke-width: 2.5px;
            rx: 16;
            ry: 16;
            filter: drop-shadow(0 4px 15px rgba(0,0,0,0.12));
            transition: all 0.3s ease;
        }
        .node-group:hover .node-rect {
            filter: drop-shadow(0 8px 30px rgba(0,0,0,0.2));
            stroke-width: 3.5px;
        }
        .node-rect.female {
            fill: url(#femaleGradient);
            stroke: var(--female-border);
        }
        .node-rect.male {
            fill: url(#maleGradient);
            stroke: var(--male-border);
        }
        .node-text {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            fill: var(--primary);
            pointer-events: none;
        }
        .node-spouse {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            fill: #666;
            font-style: italic;
            pointer-events: none;
        }
        .node-badge {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 700;
            fill: white;
            pointer-events: none;
        }
        .link {
            fill: none;
            stroke: var(--line-color);
            stroke-width: 2.5px;
            opacity: 0.6;
        }
        .gen-band {
            fill: rgba(212, 165, 116, 0.03);
            stroke: none;
        }
        .gen-band-alt {
            fill: rgba(107, 179, 217, 0.03);
            stroke: none;
        }
        .gen-label-pill {
            fill: rgba(26, 26, 46, 0.9);
            rx: 20;
            ry: 20;
        }
        .gen-label-text {
            font-family: 'Cinzel', serif;
            font-size: 12px;
            fill: var(--accent-gold);
            font-weight: 700;
            text-anchor: middle;
            dominant-baseline: middle;
        }
        .tooltip {
            position: fixed;
            background: white;
            border: 1px solid #e8e0d4;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 1000;
            max-width: 280px;
        }
        .tooltip.show { opacity: 1; }
        .tooltip-name {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 6px;
        }
        .tooltip-detail {
            font-size: 0.85rem;
            color: #555;
            line-height: 1.6;
        }
        .admin-toggle {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 200;
            transition: all 0.3s ease;
        }
        .admin-toggle:hover {
            transform: scale(1.1);
            background: var(--accent-gold);
        }
        #admin-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 90%;
            z-index: 300;
        }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 0.85rem; color: #555; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
        }
        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 250;
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }
        .scroll-hint {
            position: fixed;
            bottom: 85px;
            right: 25px;
            background: rgba(26, 26, 46, 0.8);
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            z-index: 100;
            animation: fadeOut 4s forwards;
            animation-delay: 3s;
        }
        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="main-container">
        <header>
            <h1>Phawa Ialih Family Tree</h1>
            <p class="tagline">Matrilineal Lineage Flowchart</p>
            <div class="matrilineal-badge">♀ Matrilineal Heritage</div>
        </header>

        <div class="controls">
            <button class="control-btn" onclick="fitToScreen()">🖥️ Fit to Screen</button>
            <button class="control-btn" onclick="zoomIn()">🔍 Zoom In</button>
            <button class="control-btn" onclick="zoomOut()">🔍 Zoom Out</button>
            <button class="control-btn" onclick="resetView()">↺ Reset View</button>
            <div class="legend">
                <span><span class="legend-dot female"></span>Female</span>
                <span><span class="legend-dot male"></span>Male</span>
            </div>
        </div>

        <div id="chart-wrapper"></div>
    </div>

    <div class="scroll-hint">🖱️ Scroll to explore · Drag to pan</div>
    <div class="tooltip" id="tooltip"></div>

    <button class="admin-toggle" onclick="toggleAdmin()">⚙️</button>

    <div class="overlay" id="overlay" onclick="toggleAdmin()"></div>
    <div id="admin-panel">
        <button class="close-btn" onclick="toggleAdmin()">&times;</button>
        <h3>Add New Family Member</h3>
        <form id="member-form" onsubmit="addMember(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" required placeholder="e.g., Smti Firstname Phawa">
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select id="gender">
                    <option value="F">Female</option>
                    <option value="M">Male</option>
                </select>
            </div>
            <div class="form-group">
                <label>Spouse Name (Optional)</label>
                <input type="text" id="spouse" placeholder="e.g., Shri Surname">
            </div>
            <div class="form-group">
                <label>Mother / Parent Link</label>
                <select id="parent-select" required></select>
            </div>
            <button type="submit" class="btn-submit">Save & Download JSON</button>
        </form>
    </div>

    <script>
        if (typeof d3 === 'undefined') {
            document.getElementById('chart-wrapper').innerHTML = 
                '<div style="text-align:center;padding:50px;color:red;"><h3>Error: D3.js failed to load</h3></div>';
            throw new Error('D3 not loaded');
        }

        let familyData = [];
        let svg, g, zoomBehavior;
        let chartWidth, chartHeight;

        const generationLabels = {
            0: "👑 Root Ancestor",
            1: "Great Great Grandparents",
            2: "Great Grandparents",
            3: "Grandparents",
            4: "Parents",
            5: "Current Generation"
        };

        async function loadTree() {
            try {
                const response = await fetch('./familyData.json');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                familyData = await response.json();
                renderFlowchart();
                populateParentSelect();
            } catch (err) {
                console.error("Error:", err);
                document.getElementById('chart-wrapper').innerHTML = 
                    '<div style="text-align:center;padding:50px;color:#999;"><h3>Error loading data</h3><p>' + err.message + '</p></div>';
            }
        }

        function renderFlowchart() {
            const container = document.getElementById('chart-wrapper');
            container.innerHTML = '';

            // Build tree structure
            const dataMap = new Map();
            familyData.forEach(d => {
                dataMap.set(d.id, { ...d, children: [] });
            });

            let rootData = null;
            dataMap.forEach(d => {
                if (!d.parent || d.parent === '') {
                    rootData = d;
                } else {
                    const parent = dataMap.get(d.parent);
                    if (parent) {
                        parent.children.push(d);
                    }
                }
            });

            if (!rootData) return;

            // BIGGER cards for readability
            const cardWidth = 280;
            const cardHeight = 90;
            const levelSpacing = 160;   // vertical gap between generations
            const siblingSpacing = 340; // horizontal gap between siblings

            const root = d3.hierarchy(rootData);
            const treeLayout = d3.tree().nodeSize([siblingSpacing, levelSpacing]);
            treeLayout(root);

            // Calculate bounds
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            root.each(d => {
                if (d.x < minX) minX = d.x;
                if (d.x > maxX) maxX = d.x;
                if (d.y < minY) minY = d.y;
                if (d.y > maxY) maxY = d.y;
            });

            const marginX = 120;
            const marginY = 80;
            const genLabelWidth = 200;

            chartWidth = (maxX - minX) + cardWidth + marginX * 2 + genLabelWidth;
            chartHeight = (maxY - minY) + cardHeight + marginY * 2;

            const offsetX = marginX + genLabelWidth - minX + cardWidth / 2;
            const offsetY = marginY - minY + cardHeight / 2;

            svg = d3.select("#chart-wrapper")
                .append("svg")
                .attr("width", chartWidth)
                .attr("height", chartHeight);

            const defs = svg.append("defs");

            const femaleGrad = defs.append("linearGradient")
                .attr("id", "femaleGradient")
                .attr("x1", "0%").attr("y1", "0%")
                .attr("x2", "100%").attr("y2", "100%");
            femaleGrad.append("stop").attr("offset", "0%").attr("stop-color", "#fff8fb");
            femaleGrad.append("stop").attr("offset", "100%").attr("stop-color", "#ffe8f0");

            const maleGrad = defs.append("linearGradient")
                .attr("id", "maleGradient")
                .attr("x1", "0%").attr("y1", "0%")
                .attr("x2", "100%").attr("y2", "100%");
            maleGrad.append("stop").attr("offset", "0%").attr("stop-color", "#f5fbff");
            maleGrad.append("stop").attr("offset", "100%").attr("stop-color", "#e0f0f8");

            g = svg.append("g");

            // Zoom + pan
            zoomBehavior = d3.zoom()
                .scaleExtent([0.15, 3])
                .on("zoom", (event) => {
                    g.attr("transform", event.transform);
                });

            svg.call(zoomBehavior);

            // Generation bands (horizontal rows)
            const maxDepth = root.height;
            for (let i = 0; i <= maxDepth; i++) {
                const y = offsetY + i * levelSpacing - levelSpacing / 2;
                const bandClass = i % 2 === 0 ? "gen-band" : "gen-band-alt";

                g.append("rect")
                    .attr("class", bandClass)
                    .attr("x", -marginX)
                    .attr("y", y)
                    .attr("width", chartWidth)
                    .attr("height", levelSpacing)
                    .style("pointer-events", "none");

                // Generation label pill
                const labelText = generationLabels[i] || `Generation ${i}`;
                const pillWidth = 190;
                const pillHeight = 32;

                g.append("rect")
                    .attr("class", "gen-label-pill")
                    .attr("x", 20)
                    .attr("y", y + levelSpacing / 2 - pillHeight / 2)
                    .attr("width", pillWidth)
                    .attr("height", pillHeight);

                g.append("text")
                    .attr("class", "gen-label-text")
                    .attr("x", 20 + pillWidth / 2)
                    .attr("y", y + levelSpacing / 2 + 1)
                    .text(labelText);
            }

            // Draw links
            const linkGen = d3.linkVertical()
                .x(d => d.x + offsetX)
                .y(d => d.y + offsetY);

            g.selectAll(".link")
                .data(root.links())
                .enter()
                .append("path")
                .attr("class", "link")
                .attr("d", linkGen);

            // Draw nodes
            const node = g.selectAll(".node-group")
                .data(root.descendants())
                .enter()
                .append("g")
                .attr("class", "node-group")
                .attr("transform", d => `translate(${d.x + offsetX - cardWidth/2},${d.y + offsetY - cardHeight/2})`)
                .on("mouseenter", showTooltip)
                .on("mouseleave", hideTooltip);

            // Card
            node.append("rect")
                .attr("class", d => `node-rect ${d.data.gender}`)
                .attr("width", cardWidth)
                .attr("height", cardHeight)
                .attr("rx", 16)
                .attr("ry", 16);

            // Gender icon
            node.append("text")
                .attr("x", 18)
                .attr("y", 28)
                .text(d => d.data.gender === 'F' ? '♀' : '♂')
                .attr("fill", d => d.data.gender === 'F' ? '#e8a4c9' : '#6bb3d9')
                .attr("font-size", "18px")
                .attr("font-weight", "bold")
                .style("pointer-events", "none");

            // Name
            node.append("text")
                .attr("class", "node-text")
                .attr("x", 42)
                .attr("y", 28)
                .text(d => {
                    const name = d.data.name;
                    return name.length > 32 ? name.substring(0, 30) + '...' : name;
                });

            // Spouse
            node.append("text")
                .attr("class", "node-spouse")
                .attr("x", 42)
                .attr("y", 50)
                .text(d => {
                    if (!d.data.spouse) return '';
                    const spouse = d.data.spouse;
                    return spouse.length > 34 ? '💍 ' + spouse.substring(0, 32) + '...' : '💍 ' + spouse;
                });

            // Child count
            node.filter(d => d.children && d.children.length > 0)
                .append("circle")
                .attr("cx", cardWidth - 20)
                .attr("cy", cardHeight - 20)
                .attr("r", 12)
                .attr("fill", "#1a1a2e")
                .attr("opacity", 0.85);

            node.filter(d => d.children && d.children.length > 0)
                .append("text")
                .attr("class", "node-badge")
                .attr("x", cardWidth - 20)
                .attr("y", cardHeight - 16)
                .attr("text-anchor", "middle")
                .text(d => d.children.length);

            // AUTO ZOOM: Start zoomed in enough to read, centered on root
            fitToScreen();
        }

        function fitToScreen() {
            if (!svg) return;
            const wrapper = document.getElementById('chart-wrapper');
            const wrapperW = wrapper.clientWidth;
            const wrapperH = wrapper.clientHeight;

            const scale = Math.min(
                (wrapperW - 60) / chartWidth,
                (wrapperH - 60) / chartHeight,
                0.85  // cap at 85% so it's not too zoomed out
            );

            const tx = (wrapperW - chartWidth * scale) / 2;
            const ty = 30;

            svg.transition().duration(600).call(
                zoomBehavior.transform,
                d3.zoomIdentity.translate(tx, ty).scale(scale)
            );
        }

        function zoomIn() {
            svg.transition().duration(300).call(zoomBehavior.scaleBy, 1.4);
        }

        function zoomOut() {
            svg.transition().duration(300).call(zoomBehavior.scaleBy, 0.7);
        }

        function resetView() {
            fitToScreen();
        }

        function showTooltip(event, d) {
            const tooltip = document.getElementById('tooltip');
            const data = d.data;
            let html = `<div class="tooltip-name">${data.name}</div>`;
            html += `<div class="tooltip-detail">Gender: ${data.gender === 'F' ? 'Female ♀' : 'Male ♂'}</div>`;
            if (data.spouse) html += `<div class="tooltip-detail">Spouse: ${data.spouse}</div>`;
            if (d.children && d.children.length > 0) html += `<div class="tooltip-detail">Children: ${d.children.length}</div>`;
            if (d.parent && d.parent.data) html += `<div class="tooltip-detail">Parent: ${d.parent.data.name}</div>`;

            tooltip.innerHTML = html;
            tooltip.style.left = (event.clientX + 15) + 'px';
            tooltip.style.top = (event.clientY - 10) + 'px';
            tooltip.classList.add('show');
        }

        function hideTooltip() {
            document.getElementById('tooltip').classList.remove('show');
        }

        function populateParentSelect() {
            const select = document.getElementById('parent-select');
            select.innerHTML = '<option value="">-- Select Parent --</option>';
            familyData.forEach(m => {
                const option = document.createElement('option');
                option.value = m.id;
                option.textContent = m.name;
                select.appendChild(option);
            });
        }

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            const overlay = document.getElementById('overlay');
            const isOpen = panel.style.display === 'block';
            panel.style.display = isOpen ? 'none' : 'block';
            overlay.style.display = isOpen ? 'none' : 'block';
        }

        function addMember(event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const gender = document.getElementById('gender').value;
            const spouse = document.getElementById('spouse').value;
            const parent = document.getElementById('parent-select').value;

            if (!parent) {
                alert('Please select a parent!');
                return;
            }

            const id = name.toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 15) + Math.floor(Math.random() * 1000);
            const newMember = { id, name, gender, spouse: spouse || "", parent };
            familyData.push(newMember);

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(familyData, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "familyData.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();

            renderFlowchart();
            populateParentSelect();
            document.getElementById('member-form').reset();
            toggleAdmin();
            alert("New member added! Updated familyData.json downloaded.");
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            setTimeout(fitToScreen, 100);
        });

        loadTree();
    </script>
</body>
</html>
