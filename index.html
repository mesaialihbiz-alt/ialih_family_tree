<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phawa Ialih Family Tree</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent-gold: #d4a574;
            --accent-rose: #c9a0dc;
            --female-border: #e8a4c9;
            --female-bg: #fff5f8;
            --male-border: #6bb3d9;
            --male-bg: #f0f8ff;
            --line-color: #a08060;
            --bg-cream: #faf8f5;
            --bg-warm: #f5f0e8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-cream);
            color: var(--primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Header */
        header {
            text-align: center;
            padding: 12px 20px 10px;
            background: linear-gradient(180deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            position: relative;
            z-index: 10;
            flex-shrink: 0;
        }
        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.3rem, 2.5vw, 1.8rem);
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .tagline {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.85rem;
            color: var(--accent-gold);
            margin-top: 2px;
        }
        .matrilineal-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(212, 165, 116, 0.15);
            border: 1px solid rgba(212, 165, 116, 0.3);
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 6px;
            color: var(--accent-gold);
        }

        .main-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 8px 15px;
            background: white;
            border-bottom: 1px solid #e8e0d4;
            flex-wrap: wrap;
            z-index: 10;
            flex-shrink: 0;
        }
        .control-btn {
            padding: 5px 12px;
            border: 1px solid #d4c4b0;
            background: white;
            border-radius: 18px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--primary);
            transition: all 0.3s ease;
        }
        .control-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .legend {
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 0.7rem;
        }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .legend-dot.female { background: var(--female-border); }
        .legend-dot.male { background: var(--male-border); }

        /* Chart area */
        #chart-wrapper {
            flex: 1;
            overflow: auto;
            background: linear-gradient(180deg, var(--bg-cream) 0%, var(--bg-warm) 50%, var(--bg-cream) 100%);
            position: relative;
            cursor: grab;
        }
        #chart-wrapper:active { cursor: grabbing; }
        #chart-wrapper svg { display: block; margin: 0 auto; }

        /* Node styling */
        .node-group { cursor: pointer; }
        .node-card {
            fill: white;
            stroke-width: 2.5px;
            rx: 16;
            ry: 16;
            filter: drop-shadow(0 4px 15px rgba(0,0,0,0.1));
            transition: all 0.3s ease;
        }
        .node-group:hover .node-card {
            filter: drop-shadow(0 8px 30px rgba(0,0,0,0.2));
            stroke-width: 3.5px;
        }
        .node-card.female {
            fill: url(#femaleGradient);
            stroke: var(--female-border);
        }
        .node-card.male {
            fill: url(#maleGradient);
            stroke: var(--male-border);
        }
        .node-photo-circle {
            fill: #f0f0f0;
            stroke: white;
            stroke-width: 3px;
        }
        .node-photo-text {
            font-family: 'Cinzel', serif;
            font-size: 18px;
            font-weight: 700;
            fill: #ccc;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
        }
        .node-name {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 700;
            fill: var(--primary);
            pointer-events: none;
        }
        .node-spouse {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            fill: #888;
            font-style: italic;
            pointer-events: none;
        }
        .node-designation {
            font-family: 'Inter', sans-serif;
            font-size: 9px;
            font-weight: 600;
            fill: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            pointer-events: none;
        }
        .node-badge {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 700;
            fill: white;
            pointer-events: none;
        }
        .click-hint {
            font-family: 'Inter', sans-serif;
            font-size: 8px;
            fill: #bbb;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .node-group:hover .click-hint { opacity: 1; }

        /* Links */
        .link {
            fill: none;
            stroke: var(--line-color);
            stroke-width: 2.5px;
            opacity: 0.5;
        }

        /* Generation bands */
        .gen-band { fill: rgba(212, 165, 116, 0.025); }
        .gen-band-alt { fill: rgba(107, 179, 217, 0.025); }
        .gen-label-pill { fill: rgba(26, 26, 46, 0.88); rx: 16; ry: 16; }
        .gen-label-text {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            fill: var(--accent-gold);
            font-weight: 700;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        /* Profile Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 500;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.show { display: flex; opacity: 1; }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: white;
            border-radius: 24px;
            width: 90%;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            z-index: 600;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .modal-header {
            padding: 30px 30px 20px;
            text-align: center;
            position: relative;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 24px 24px 0 0;
            color: white;
        }
        .modal-header.female { background: linear-gradient(135deg, #8b4a6b 0%, #c97a9a 100%); }
        .modal-header.male { background: linear-gradient(135deg, #3a6b8b 0%, #6a9ac9 100%); }

        .modal-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 4px solid rgba(255,255,255,0.4);
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
            font-size: 36px;
            font-weight: 700;
            color: white;
        }
        .modal-name {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .modal-designation {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .modal-close:hover { background: rgba(255,255,255,0.4); transform: rotate(90deg); }

        .modal-body {
            padding: 25px 30px 30px;
        }
        .modal-section {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0e8e0;
        }
        .modal-section:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .modal-section-title {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .modal-section-text {
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: #444;
            line-height: 1.7;
        }
        .modal-funfact {
            background: linear-gradient(135deg, #fff8f0 0%, #fff0e0 100%);
            border-left: 4px solid var(--accent-gold);
            padding: 15px 18px;
            border-radius: 0 12px 12px 0;
            font-style: italic;
            color: #665;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .modal-funfact::before {
            content: "💡 Fun Fact: ";
            font-weight: 700;
            font-style: normal;
            color: var(--accent-gold);
        }
        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .modal-tag {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* Tooltip */
        .tooltip {
            position: fixed;
            background: white;
            border: 1px solid #e8e0d4;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 400;
            max-width: 260px;
        }
        .tooltip.show { opacity: 1; }
        .tooltip-name {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1rem;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .tooltip-detail {
            font-size: 0.8rem;
            color: #666;
            line-height: 1.5;
        }

        /* Admin */
        .admin-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 200;
            transition: all 0.3s ease;
        }
        .admin-toggle:hover { transform: scale(1.1); background: var(--accent-gold); }

        #admin-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            max-width: 500px;
            width: 90%;
            z-index: 700;
            max-height: 90vh;
            overflow-y: auto;
        }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 500; font-size: 0.8rem; color: #555; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            resize: vertical;
        }
        .form-group textarea { min-height: 60px; }
        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 650;
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }

        .scroll-hint {
            position: fixed;
            bottom: 75px;
            right: 20px;
            background: rgba(26, 26, 46, 0.85);
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            z-index: 100;
            animation: fadeOut 4s forwards;
            animation-delay: 4s;
        }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
    </style>
<base target="_blank">
</head>
<body>
    <div class="main-container">
        <header>
            <h1>Phawa Ialih Family Tree</h1>
            <p class="tagline">Matrilineal Lineage Flowchart</p>
            <div class="matrilineal-badge">♀ Matrilineal Heritage</div>
        </header>

        <div class="controls">
            <button class="control-btn" onclick="fitToScreen()">🖥️ Fit Screen</button>
            <button class="control-btn" onclick="zoomIn()">🔍 In</button>
            <button class="control-btn" onclick="zoomOut()">🔍 Out</button>
            <button class="control-btn" onclick="resetView()">↺ Reset</button>
            <div class="legend">
                <span><span class="legend-dot female"></span>Female</span>
                <span><span class="legend-dot male"></span>Male</span>
            </div>
        </div>

        <div id="chart-wrapper"></div>
    </div>

    <div class="scroll-hint">🖱️ Click cards for stories · Scroll/drag to explore</div>
    <div class="tooltip" id="tooltip"></div>

    <!-- Profile Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
    <div class="modal" id="profileModal">
        <div class="modal-header" id="modalHeader">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-avatar" id="modalAvatar">👤</div>
            <div class="modal-name" id="modalName">Name</div>
            <div class="modal-designation" id="modalDesignation">Designation</div>
        </div>
        <div class="modal-body" id="modalBody">
            <!-- Content injected by JS -->
        </div>
    </div>

    <!-- Admin Panel -->
    <button class="admin-toggle" onclick="toggleAdmin()">⚙️</button>
    <div class="overlay" id="overlay" onclick="toggleAdmin()"></div>
    <div id="admin-panel">
        <button class="close-btn" onclick="toggleAdmin()">&times;</button>
        <h3 style="font-family:Cinzel,serif;margin-bottom:15px;">✏️ Edit Family Member</h3>
        <form id="member-form" onsubmit="saveMember(event)">
            <div class="form-group">
                <label>Select Person to Edit</label>
                <select id="edit-select" onchange="loadPersonForEdit()" required>
                    <option value="">-- Choose someone --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="edit-name" required>
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select id="edit-gender">
                    <option value="F">Female ♀</option>
                    <option value="M">Male ♂</option>
                </select>
            </div>
            <div class="form-group">
                <label>Spouse Name</label>
                <input type="text" id="edit-spouse" placeholder="e.g., Shri Surname">
            </div>
            <div class="form-group">
                <label>Designation / Title</label>
                <input type="text" id="edit-designation" placeholder="e.g., Grandmother, Uncle">
            </div>
            <div class="form-group">
                <label>Bio / Story</label>
                <textarea id="edit-bio" placeholder="Tell their story..."></textarea>
            </div>
            <div class="form-group">
                <label>Hobbies & Interests</label>
                <input type="text" id="edit-hobbies" placeholder="e.g., Cooking, singing, gardening">
            </div>
            <div class="form-group">
                <label>Fun Fact</label>
                <input type="text" id="edit-funfact" placeholder="Something unique about them">
            </div>
            <div class="form-group">
                <label>Photo URL (optional)</label>
                <input type="text" id="edit-photo" placeholder="https://...">
            </div>
            <button type="submit" class="btn-submit">💾 Save Changes & Download JSON</button>
        </form>
        <hr style="margin:20px 0;border:none;border-top:1px solid #eee;">
        <h3 style="font-family:Cinzel,serif;margin-bottom:15px;font-size:1rem;">➕ Add New Member</h3>
        <form id="add-form" onsubmit="addNewMember(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="new-name" required placeholder="e.g., Smti Firstname Phawa">
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select id="new-gender">
                    <option value="F">Female</option>
                    <option value="M">Male</option>
                </select>
            </div>
            <div class="form-group">
                <label>Parent</label>
                <select id="new-parent" required></select>
            </div>
            <button type="submit" class="btn-submit">➕ Add Member</button>
        </form>
    </div>

    <script>
        if (typeof d3 === 'undefined') {
            document.getElementById('chart-wrapper').innerHTML = 
                '<div style="text-align:center;padding:50px;color:red;"><h3>Error: D3.js failed to load</h3></div>';
            throw new Error('D3 not loaded');
        }

        let familyData = [];
        let svg, g, zoomBehavior;
        let chartWidth, chartHeight;

        const generationLabels = {
            0: "👑 Root Ancestor",
            1: "Great Great Grandparents",
            2: "Great Grandparents",
            3: "Grandparents",
            4: "Parents",
            5: "Current Generation"
        };

        async function loadTree() {
            try {
                const response = await fetch('./familyData.json');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                familyData = await response.json();
                renderFlowchart();
                populateSelects();
            } catch (err) {
                console.error("Error:", err);
                document.getElementById('chart-wrapper').innerHTML = 
                    '<div style="text-align:center;padding:50px;color:#999;"><h3>Error loading data</h3><p>' + err.message + '</p></div>';
            }
        }

        function renderFlowchart() {
            const container = document.getElementById('chart-wrapper');
            container.innerHTML = '';

            const dataMap = new Map();
            familyData.forEach(d => {
                dataMap.set(d.id, { ...d, children: [] });
            });

            let rootData = null;
            dataMap.forEach(d => {
                if (!d.parent || d.parent === '') {
                    rootData = d;
                } else {
                    const parent = dataMap.get(d.parent);
                    if (parent) {
                        parent.children.push(d);
                    }
                }
            });

            if (!rootData) return;

            const cardWidth = 260;
            const cardHeight = 95;
            const levelSpacing = 170;
            const siblingSpacing = 300;

            const root = d3.hierarchy(rootData);
            const treeLayout = d3.tree().nodeSize([siblingSpacing, levelSpacing]);
            treeLayout(root);

            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            root.each(d => {
                if (d.x < minX) minX = d.x;
                if (d.x > maxX) maxX = d.x;
                if (d.y < minY) minY = d.y;
                if (d.y > maxY) maxY = d.y;
            });

            const marginX = 100;
            const marginY = 80;
            const genLabelWidth = 200;

            chartWidth = (maxX - minX) + cardWidth + marginX * 2 + genLabelWidth;
            chartHeight = (maxY - minY) + cardHeight + marginY * 2;

            const offsetX = marginX + genLabelWidth - minX + cardWidth / 2;
            const offsetY = marginY - minY + cardHeight / 2;

            svg = d3.select("#chart-wrapper")
                .append("svg")
                .attr("width", chartWidth)
                .attr("height", chartHeight);

            const defs = svg.append("defs");

            const femaleGrad = defs.append("linearGradient")
                .attr("id", "femaleGradient")
                .attr("x1", "0%").attr("y1", "0%")
                .attr("x2", "100%").attr("y2", "100%");
            femaleGrad.append("stop").attr("offset", "0%").attr("stop-color", "#fff8fb");
            femaleGrad.append("stop").attr("offset", "100%").attr("stop-color", "#ffe8f0");

            const maleGrad = defs.append("linearGradient")
                .attr("id", "maleGradient")
                .attr("x1", "0%").attr("y1", "0%")
                .attr("x2", "100%").attr("y2", "100%");
            maleGrad.append("stop").attr("offset", "0%").attr("stop-color", "#f5fbff");
            maleGrad.append("stop").attr("offset", "100%").attr("stop-color", "#e0f0f8");

            g = svg.append("g");

            zoomBehavior = d3.zoom()
                .scaleExtent([0.15, 3])
                .on("zoom", (event) => {
                    g.attr("transform", event.transform);
                });

            svg.call(zoomBehavior);

            // Generation bands
            const maxDepth = root.height;
            for (let i = 0; i <= maxDepth; i++) {
                const y = offsetY + i * levelSpacing - levelSpacing / 2;
                const bandClass = i % 2 === 0 ? "gen-band" : "gen-band-alt";

                g.append("rect")
                    .attr("class", bandClass)
                    .attr("x", -marginX)
                    .attr("y", y)
                    .attr("width", chartWidth)
                    .attr("height", levelSpacing)
                    .style("pointer-events", "none");

                const labelText = generationLabels[i] || `Generation ${i}`;
                const pillWidth = 185;
                const pillHeight = 30;

                g.append("rect")
                    .attr("class", "gen-label-pill")
                    .attr("x", 15)
                    .attr("y", y + levelSpacing / 2 - pillHeight / 2)
                    .attr("width", pillWidth)
                    .attr("height", pillHeight);

                g.append("text")
                    .attr("class", "gen-label-text")
                    .attr("x", 15 + pillWidth / 2)
                    .attr("y", y + levelSpacing / 2 + 1)
                    .text(labelText);
            }

            // Links
            const linkGen = d3.linkVertical()
                .x(d => d.x + offsetX)
                .y(d => d.y + offsetY);

            g.selectAll(".link")
                .data(root.links())
                .enter()
                .append("path")
                .attr("class", "link")
                .attr("d", linkGen);

            // Nodes
            const node = g.selectAll(".node-group")
                .data(root.descendants())
                .enter()
                .append("g")
                .attr("class", "node-group")
                .attr("transform", d => `translate(${d.x + offsetX - cardWidth/2},${d.y + offsetY - cardHeight/2})`)
                .on("mouseenter", showTooltip)
                .on("mouseleave", hideTooltip)
                .on("click", (event, d) => openProfile(d.data));

            // Card background
            node.append("rect")
                .attr("class", d => `node-card ${d.data.gender}`)
                .attr("width", cardWidth)
                .attr("height", cardHeight)
                .attr("rx", 16)
                .attr("ry", 16);

            // Avatar circle
            node.append("circle")
                .attr("class", "node-photo-circle")
                .attr("cx", 35)
                .attr("cy", cardHeight / 2)
                .attr("r", 22);

            // Avatar initial
            node.append("text")
                .attr("class", "node-photo-text")
                .attr("x", 35)
                .attr("y", cardHeight / 2 + 2)
                .text(d => d.data.name.charAt(0));

            // Gender icon
            node.append("text")
                .attr("x", 68)
                .attr("y", 22)
                .text(d => d.data.gender === 'F' ? '♀' : '♂')
                .attr("fill", d => d.data.gender === 'F' ? '#e8a4c9' : '#6bb3d9')
                .attr("font-size", "14px")
                .style("pointer-events", "none");

            // Name
            node.append("text")
                .attr("class", "node-name")
                .attr("x", 85)
                .attr("y", 22)
                .text(d => {
                    const name = d.data.name;
                    return name.length > 22 ? name.substring(0, 20) + '...' : name;
                });

            // Designation
            node.append("text")
                .attr("class", "node-designation")
                .attr("x", 68)
                .attr("y", 40)
                .text(d => d.data.designation || '');

            // Spouse
            node.append("text")
                .attr("class", "node-spouse")
                .attr("x", 68)
                .attr("y", 56)
                .text(d => {
                    if (!d.data.spouse) return '';
                    const spouse = d.data.spouse;
                    return spouse.length > 28 ? '💍 ' + spouse.substring(0, 26) + '...' : '💍 ' + spouse;
                });

            // Click hint
            node.append("text")
                .attr("class", "click-hint")
                .attr("x", cardWidth / 2)
                .attr("y", cardHeight - 8)
                .attr("text-anchor", "middle")
                .text("👆 Click for story");

            // Child count badge
            node.filter(d => d.children && d.children.length > 0)
                .append("circle")
                .attr("cx", cardWidth - 18)
                .attr("cy", 18)
                .attr("r", 11)
                .attr("fill", "#1a1a2e")
                .attr("opacity", 0.85);

            node.filter(d => d.children && d.children.length > 0)
                .append("text")
                .attr("class", "node-badge")
                .attr("x", cardWidth - 18)
                .attr("y", 22)
                .attr("text-anchor", "middle")
                .text(d => d.children.length);

            fitToScreen();
        }

        // ===== PROFILE MODAL =====
        function openProfile(data) {
            const modal = document.getElementById('profileModal');
            const overlay = document.getElementById('modalOverlay');
            const header = document.getElementById('modalHeader');

            header.className = 'modal-header ' + (data.gender === 'F' ? 'female' : 'male');
            document.getElementById('modalAvatar').textContent = data.name.charAt(0);
            document.getElementById('modalName').textContent = data.name;
            document.getElementById('modalDesignation').textContent = data.designation || (data.gender === 'F' ? 'Family Member' : 'Family Member');

            let bodyHTML = '';

            if (data.bio) {
                bodyHTML += `
                    <div class="modal-section">
                        <div class="modal-section-title">📖 Their Story</div>
                        <div class="modal-section-text">${data.bio}</div>
                    </div>
                `;
            }

            if (data.hobbies) {
                bodyHTML += `
                    <div class="modal-section">
                        <div class="modal-section-title">🎯 Hobbies & Passions</div>
                        <div class="modal-tags">
                            ${data.hobbies.split(',').map(h => `<span class="modal-tag">${h.trim()}</span>`).join('')}
                        </div>
                    </div>
                `;
            }

            if (data.spouse) {
                bodyHTML += `
                    <div class="modal-section">
                        <div class="modal-section-title">💍 Partner</div>
                        <div class="modal-section-text">${data.spouse}</div>
                    </div>
                `;
            }

            if (data.funFact) {
                bodyHTML += `
                    <div class="modal-section">
                        <div class="modal-funfact">${data.funFact}</div>
                    </div>
                `;
            }

            // Find children
            const children = familyData.filter(m => m.parent === data.id);
            if (children.length > 0) {
                bodyHTML += `
                    <div class="modal-section">
                        <div class="modal-section-title">👶 Children (${children.length})</div>
                        <div class="modal-tags">
                            ${children.map(c => `<span class="modal-tag">${c.name}</span>`).join('')}
                        </div>
                    </div>
                `;
            }

            document.getElementById('modalBody').innerHTML = bodyHTML;

            overlay.style.display = 'flex';
            modal.style.display = 'block';
            setTimeout(() => {
                overlay.classList.add('show');
                modal.classList.add('show');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('profileModal');
            const overlay = document.getElementById('modalOverlay');
            modal.classList.remove('show');
            overlay.classList.remove('show');
            setTimeout(() => {
                modal.style.display = 'none';
                overlay.style.display = 'none';
            }, 300);
        }

        // ===== TOOLTIP =====
        function showTooltip(event, d) {
            const tooltip = document.getElementById('tooltip');
            const data = d.data;
            let html = `<div class="tooltip-name">${data.name}</div>`;
            if (data.designation) html += `<div class="tooltip-detail">${data.designation}</div>`;
            if (data.spouse) html += `<div class="tooltip-detail">💍 ${data.spouse}</div>`;
            if (d.children && d.children.length > 0) html += `<div class="tooltip-detail">👶 ${d.children.length} children</div>`;
            html += `<div class="tooltip-detail" style="margin-top:6px;color:#999;font-size:0.75rem;">👆 Click to read their story</div>`;

            tooltip.innerHTML = html;
            tooltip.style.left = (event.clientX + 15) + 'px';
            tooltip.style.top = (event.clientY - 10) + 'px';
            tooltip.classList.add('show');
        }

        function hideTooltip() {
            document.getElementById('tooltip').classList.remove('show');
        }

        // ===== ZOOM & PAN =====
        function fitToScreen() {
            if (!svg) return;
            const wrapper = document.getElementById('chart-wrapper');
            const wrapperW = wrapper.clientWidth;
            const wrapperH = wrapper.clientHeight;

            const scale = Math.min(
                (wrapperW - 40) / chartWidth,
                (wrapperH - 40) / chartHeight,
                0.9
            );

            const tx = (wrapperW - chartWidth * scale) / 2;
            const ty = 20;

            svg.transition().duration(600).call(
                zoomBehavior.transform,
                d3.zoomIdentity.translate(tx, ty).scale(scale)
            );
        }

        function zoomIn() {
            svg.transition().duration(300).call(zoomBehavior.scaleBy, 1.4);
        }

        function zoomOut() {
            svg.transition().duration(300).call(zoomBehavior.scaleBy, 0.7);
        }

        function resetView() {
            fitToScreen();
        }

        // ===== ADMIN PANEL =====
        function populateSelects() {
            const editSelect = document.getElementById('edit-select');
            const parentSelect = document.getElementById('new-parent');

            editSelect.innerHTML = '<option value="">-- Choose someone --</option>';
            parentSelect.innerHTML = '<option value="">-- Select Parent --</option>';

            familyData.forEach(m => {
                const opt1 = document.createElement('option');
                opt1.value = m.id;
                opt1.textContent = m.name;
                editSelect.appendChild(opt1);

                const opt2 = document.createElement('option');
                opt2.value = m.id;
                opt2.textContent = m.name;
                parentSelect.appendChild(opt2);
            });
        }

        function loadPersonForEdit() {
            const id = document.getElementById('edit-select').value;
            if (!id) return;

            const person = familyData.find(m => m.id === id);
            if (!person) return;

            document.getElementById('edit-name').value = person.name || '';
            document.getElementById('edit-gender').value = person.gender || 'F';
            document.getElementById('edit-spouse').value = person.spouse || '';
            document.getElementById('edit-designation').value = person.designation || '';
            document.getElementById('edit-bio').value = person.bio || '';
            document.getElementById('edit-hobbies').value = person.hobbies || '';
            document.getElementById('edit-funfact').value = person.funFact || '';
            document.getElementById('edit-photo').value = person.photo || '';
        }

        function saveMember(event) {
            event.preventDefault();
            const id = document.getElementById('edit-select').value;
            if (!id) { alert('Please select a person to edit!'); return; }

            const idx = familyData.findIndex(m => m.id === id);
            if (idx === -1) return;

            familyData[idx].name = document.getElementById('edit-name').value;
            familyData[idx].gender = document.getElementById('edit-gender').value;
            familyData[idx].spouse = document.getElementById('edit-spouse').value;
            familyData[idx].designation = document.getElementById('edit-designation').value;
            familyData[idx].bio = document.getElementById('edit-bio').value;
            familyData[idx].hobbies = document.getElementById('edit-hobbies').value;
            familyData[idx].funFact = document.getElementById('edit-funfact').value;
            familyData[idx].photo = document.getElementById('edit-photo').value;

            downloadJSON();
            renderFlowchart();
            populateSelects();
            toggleAdmin();
            alert("✅ Changes saved! familyData.json downloaded. Upload to GitHub to update the site.");
        }

        function addNewMember(event) {
            event.preventDefault();
            const name = document.getElementById('new-name').value;
            const gender = document.getElementById('new-gender').value;
            const parent = document.getElementById('new-parent').value;

            if (!parent) { alert('Please select a parent!'); return; }

            const id = name.toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 15) + Math.floor(Math.random() * 1000);
            const newMember = { 
                id, name, gender, parent, 
                spouse: "", 
                bio: "", 
                hobbies: "", 
                designation: "", 
                funFact: "" 
            };
            familyData.push(newMember);

            downloadJSON();
            renderFlowchart();
            populateSelects();
            document.getElementById('add-form').reset();
            alert("✅ New member added! familyData.json downloaded. Upload to GitHub to update.");
        }

        function downloadJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(familyData, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "familyData.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            const overlay = document.getElementById('overlay');
            const isOpen = panel.style.display === 'block';
            panel.style.display = isOpen ? 'none' : 'block';
            overlay.style.display = isOpen ? 'none' : 'block';
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        window.addEventListener('resize', () => {
            setTimeout(fitToScreen, 100);
        });

        loadTree();
    </script>
</body>
</html>
